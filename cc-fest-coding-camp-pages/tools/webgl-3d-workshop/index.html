<!DOCTYPE html>
<html>
<head>
<title>WebGL 3D Workshop — CC Fest Coding Camp</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; font-family: Arial; }
        .container { width: 1000px; margin: 20px; display: flex; gap: 20px; }
        .controls { 
            width: 300px;
            padding: 20px; 
            border: 1px solid #ccc; 
            border-radius: 5px;
            background: white;
        }
        .main-view { flex-grow: 1; }
        .code-display { 
            font-family: monospace; 
            background: #f0f0f0; 
            padding: 15px; 
            border-radius: 5px;
            margin: 10px 0;
            white-space: pre;
            font-size: 12px;
        }
        .slider-container {
            margin: 10px 0;
        }
        .slider-label {
            display: inline-block;
            width: 100px;
        }
        select, button { 
            margin: 5px 0; 
            padding: 8px;
            width: 100%;
        }
        .canvas-container { 
            border: 1px solid #ddd; 
            margin: 10px 0;
            background: #f8f8f8;
        }
        .material-options, .transform-options {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>WebGL 3D Workshop</h1>
    <div class="container">
        <div class="controls">
            <h3>Shape Controls</h3>
            <select id="shapeType" onchange="updateShape()">
                <option value="box">Box</option>
                <option value="sphere">Sphere</option>
                <option value="cylinder">Cylinder</option>
                <option value="cone">Cone</option>
                <option value="torus">Torus</option>
                <option value="custom">Custom Shape</option>
            </select>

            <div class="material-options">
                <h3>Material & Color</h3>
                <select id="materialType" onchange="updateMaterial()">
                    <option value="normal">Normal Material</option>
                    <option value="basic">Basic Material</option>
                    <option value="phong">Phong Material</option>
                </select>
                <input type="color" id="colorPicker" value="#ff0000" onchange="updateColor(this.value)" style="width: 100%; margin: 5px 0;">
            </div>

            <div class="transform-options">
                <h3>Transformations</h3>
                <div class="slider-container">
                    <span class="slider-label">Scale:</span>
                    <input type="range" id="scaleSlider" min="0.1" max="2" step="0.1" value="1" onchange="updateTransforms()">
                </div>
                <div class="slider-container">
                    <span class="slider-label">Rotate X:</span>
                    <input type="range" id="rotateXSlider" min="0" max="360" value="0" onchange="updateTransforms()">
                </div>
                <div class="slider-container">
                    <span class="slider-label">Rotate Y:</span>
                    <input type="range" id="rotateYSlider" min="0" max="360" value="0" onchange="updateTransforms()">
                </div>
                <div class="slider-container">
                    <span class="slider-label">Rotate Z:</span>
                    <input type="range" id="rotateZSlider" min="0" max="360" value="0" onchange="updateTransforms()">
                </div>
            </div>

            <div class="animation-options">
                <h3>Animation</h3>
                <button onclick="toggleAutoRotate()">Toggle Auto-Rotate</button>
                <button onclick="resetCamera()">Reset Camera</button>
            </div>

            <div class="code-display" id="codeDisplay"></div>
        </div>

        <div class="main-view">
            <div id="canvas-container" class="canvas-container"></div>
        </div>
    </div>

    <script>
let autoRotate = true;
let shape = "box";
let material = "normal";
let shapeColor = "#ff0000";
let rotationX = 0;
let rotationY = 0;
let rotationZ = 0;
let scale = 1;
let cameraZ = 0;

new p5((p) => {
  let time = 0;

  p.setup = () => {
    let canvas = p.createCanvas(600, 600, p.WEBGL);
    canvas.parent("canvas-container");
    p.noStroke();
    updateCodeDisplay();
  };

  p.draw = () => {
    p.background(240);

    // Add ambient light
    p.ambientLight(60);
    p.pointLight(255, 255, 255, 50, 50, 50);

    // Camera control with mouse
    if (p.mouseIsPressed) {
      cameraZ = p.map(p.mouseY, 0, p.height, -500, 500);
    }
    p.camera(0, 0, 300 + cameraZ, 0, 0, 0, 0, 1, 0);

    // Apply transforms
    p.scale(scale);
    p.rotateX(p.radians(rotationX + (autoRotate ? time : 0)));
    p.rotateY(p.radians(rotationY + (autoRotate ? time * 1.5 : 0)));
    p.rotateZ(p.radians(rotationZ));

    // Set material
    switch (material) {
      case "normal":
        p.normalMaterial();
        break;
      case "basic":
        p.fill(shapeColor);
        break;
      case "phong":
        p.specularMaterial(250);
        p.fill(shapeColor);
        break;
    }

    // Draw shape
    switch (shape) {
      case "box":
        p.box(100);
        break;
      case "sphere":
        p.sphere(50);
        break;
      case "cylinder":
        p.cylinder(30, 100);
        break;
      case "cone":
        p.cone(40, 100);
        break;
      case "torus":
        p.torus(50, 20);
        break;
      case "custom":
        drawCustomShape(p);
        break;
    }

    // Draw coordinate system helpers
    drawCoordinateSystem(p);

    if (autoRotate) {
      time += 0.5;
    }
  };
}, "canvas-container");

function drawCoordinateSystem(p) {
  // X axis - red
  p.push();
  p.stroke(255, 0, 0);
  p.line(-100, 0, 0, 100, 0, 0);
  p.pop();

  // Y axis - green
  p.push();
  p.stroke(0, 255, 0);
  p.line(0, -100, 0, 0, 100, 0);
  p.pop();

  // Z axis - blue
  p.push();
  p.stroke(0, 0, 255);
  p.line(0, 0, -100, 0, 0, 100);
  p.pop();
}

function drawCustomShape(p) {
  p.beginShape();
  for (let i = 0; i < 10; i++) {
    let angle = p.map(i, 0, 10, 0, p.TWO_PI);
    let x = p.cos(angle) * 50;
    let y = p.sin(angle) * 50;
    let z = p.sin(angle * 2) * 30;
    p.vertex(x, y, z);
  }
  p.endShape(p.CLOSE);
}

function updateShape() {
  shape = document.getElementById("shapeType").value;
  updateCodeDisplay();
}

function updateMaterial() {
  material = document.getElementById("materialType").value;
  updateCodeDisplay();
}

function updateColor(color) {
  shapeColor = color;
  updateCodeDisplay();
}

function updateTransforms() {
  scale = parseFloat(document.getElementById("scaleSlider").value);
  rotationX = parseFloat(document.getElementById("rotateXSlider").value);
  rotationY = parseFloat(document.getElementById("rotateYSlider").value);
  rotationZ = parseFloat(document.getElementById("rotateZSlider").value);
  updateCodeDisplay();
}

function toggleAutoRotate() {
  autoRotate = !autoRotate;
  updateCodeDisplay();
}

function resetCamera() {
  cameraZ = 0;
  updateCodeDisplay();
}

function updateCodeDisplay() {
  let code = `// p5.js 3D Shape Creation
function setup() {
  createCanvas(600, 600, WEBGL);
  noStroke();
}

function draw() {
  background(240);
  
  // Lighting
  ambientLight(60);
  pointLight(255, 255, 255, 50, 50, 50);
  
  // Transformations
  scale(${scale});
  rotateX(${rotationX});
  rotateY(${rotationY});
  rotateZ(${rotationZ});
  
  // Material
  ${
    material === "normal"
      ? "normalMaterial();"
      : material === "basic"
      ? `fill('${shapeColor}');`
      : `specularMaterial(250);\nfill('${shapeColor}');`
  }
  
  // Shape
  ${
    shape === "box"
      ? "box(100);"
      : shape === "sphere"
      ? "sphere(50);"
      : shape === "cylinder"
      ? "cylinder(30, 100);"
      : shape === "cone"
      ? "cone(40, 100);"
      : shape === "torus"
      ? "torus(50, 20);"
      : "// Custom shape vertices..."
  }
}`;
  document.getElementById("codeDisplay").innerText = code;
}

</script>
  </body>
</html>
