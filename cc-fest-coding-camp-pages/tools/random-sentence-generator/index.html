  <body>
    <main>
    </main>
    <script>
// let x = 0;
let x = [3, 7, 9, 2];

let verbs = ["runs", "jumps","swims"];
let nouns = ["saber", "meghna", "anaya"];
let adverbs = ["fast", "slowly", "quietly"];

function setup() {
  createCanvas(400, 400);
  //console.log(x[0]);
  
}

function mousePressed(){
  background(255);
  for(let i = 0; i < 3; i = i + 1){
    textSize(20);
    text(random(nouns) + " " + random(verbs) + " " + random(adverbs) + ".", 50 * i + 50, 50 * i + 50)
    
  }
}


</script>
