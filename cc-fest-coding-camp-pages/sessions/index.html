<body>
  <div class="shell">
    <div class="site-topbar">
      <a class="brand-mark" href="../index.html">CC Fest · Coding Camp Tools</a>
      <nav class="topbar-links" aria-label="Sessions page links">
        <a class="topbar-link" href="https://ccfest.rocks">ccfest.rocks</a>
        <a class="topbar-link" href="../concept-map.html">Map</a>
        <a class="topbar-link" href="../about.html">About</a>
        <a class="topbar-link" href="../index.html">Tools</a>
        <a class="topbar-link" href="https://github.com/saberkhan372/CC-Fest-Coding-Camp">GitHub</a>
      </nav>
    </div>

    <main class="sessions-main">
      <header class="sessions-header">
        <h1>CC Fest Sessions</h1>
        <p>Five workshop sessions, each with a poster, an anchor bridge, and a small set of tools and sketches for the day.</p>
      </header>

      <div class="sessions-body">
        <div id="sessions-spine" aria-label="Session arc navigation"></div>
        <div class="sessions-grid" id="sessions-grid"></div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="../catalog-data.js?v=20260603-audit-freshness"></script>
  <script src="../sessions-data.js?v=20260603-phase4-sessions"></script>
  <script src="../spine.js?v=20260603-phase8"></script>
  <script>
  const SESSIONS = (window.CCFestSessions || []).filter((session) => session.id !== "template");
  const catalogById = new Map((window.CCFestCatalog?.items || []).map((item) => [item.id, item]));

  function sessionHref(session) {
    return (session.href || "").replace(/^sessions\//, "");
  }

  function resourceTitle(slug) {
    return catalogById.get(slug)?.title || slug.replaceAll("-", " ");
  }

  function resourcePill(kind, slug) {
    const base = kind === "bridge" ? "../concept-bridges/" : "../tools/";
    return `<a class="session-resource-pill session-resource-pill--${kind}" href="${base}${slug}/">${resourceTitle(slug)}</a>`;
  }

  document.fonts.ready.then(() => {
    const grid = document.getElementById("sessions-grid");

    SESSIONS.forEach((session) => {
      const card = document.createElement("article");
      card.className = `session-card session-card--${session.id}`;
      const details = session.anchorBridge ? `
        <div class="session-card-resources">
          ${resourcePill("bridge", session.anchorBridge)}
          ${(session.featuredTools || []).slice(0, 2).map((slug) => resourcePill("tool", slug)).join("")}
          ${(session.featuredSketches || []).slice(0, 2).map((slug) => resourcePill("sketch", slug)).join("")}
        </div>
      ` : "";
      card.innerHTML = `
        <a class="session-card-main" href="${sessionHref(session)}">
          <div class="session-card-thumb" id="thumb-${session.id}"></div>
          <div class="session-card-meta">
            <p class="session-label">${session.label}</p>
            <h2>${session.title}</h2>
            <p class="session-focus">${session.subtitle}</p>
          </div>
        </a>
        ${details}
      `;
      grid.appendChild(card);

      new p5((p) => {
        p.setup = () => {
          const canvas = p.createCanvas(520, 200);
          canvas.parent(document.getElementById("thumb-" + session.id));
          p.noLoop();
          drawThumb(p, session);
        };
      });
    });
  });

  function drawThumb(p, session) {
    p.background(250, 246, 240);
    p.fill(44, 42, 38, 23);
    p.noStroke();
    for (let x = 2; x < p.width; x += 20) {
      for (let y = 2; y < p.height; y += 20) {
        p.circle(x, y, 3);
        p.circle(x + 10, y + 10, 3);
      }
    }

    const accent = p.color(session.accent);
    p.fill(accent);
    p.noStroke();
    p.rect(0, 0, p.width, 36);

    p.fill(255, 253, 247);
    p.textFont("DM Mono");
    p.textSize(10);
    p.text("CC FEST / CODING CAMP", 14, 23);

    p.fill(44, 42, 38);
    p.textFont("Fraunces");
    p.textSize(28);
    p.textLeading(30);
    p.text(session.topic, 14, 72);

    p.randomSeed(session.seed);
    const count = 7;
    const margin = 14;
    const spacing = (p.width - 2 * margin) / (count - 1);
    for (let i = 0; i < count; i++) {
      const x = margin + i * spacing;
      const d = 14 + p.random(-4, 4);
      if (p.random() > 0.55) {
        p.fill(accent);
        p.noStroke();
      } else {
        p.noFill();
        p.stroke(44, 42, 38);
        p.strokeWeight(1.5);
      }
      p.circle(x, 165, d);
    }

    p.noStroke();
    p.fill(107, 103, 96);
    p.textFont("DM Mono");
    p.textSize(9);
    p.text(session.date, 14, 190);
  }
  </script>
  <script>
  // Session spine side rail.
  // Renders an initial state immediately (never blank), then tracks the active
  // session on scroll. Does NOT depend on IntersectionObserver firing — the rail
  // paints as soon as CCS + cards exist, and the highlight follows scroll via rAF.
  (function () {
    var spineEl = document.getElementById('sessions-spine');
    if (!spineEl) return;

    function start() {
      if (!window.CCS) return false;
      var cards = Array.prototype.slice.call(document.querySelectorAll('.session-card'));
      if (!cards.length) return false;

      var current = -1;
      function paint(i) {
        if (i === current) return;
        current = i;
        window.CCS.renderSideRail(spineEl, i >= 0 ? i : 0);
      }

      // Initial render — the rail is visible the moment the page is ready,
      // regardless of scroll position or whether IO ever fires.
      paint(0);

      // Active session = the card whose center is nearest a line ~38% down the
      // viewport. Deterministic; works on desktop grid and mobile stack alike.
      function computeActive() {
        var line = window.innerHeight * 0.38;
        var best = 0, bestDist = Infinity;
        for (var i = 0; i < cards.length; i++) {
          var r = cards[i].getBoundingClientRect();
          var center = r.top + r.height / 2;
          var d = Math.abs(center - line);
          if (d < bestDist) { bestDist = d; best = i; }
        }
        paint(best);
      }

      var ticking = false;
      function onScroll() {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(function () { computeActive(); ticking = false; });
      }
      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', onScroll, { passive: true });
      computeActive();
      return true;
    }

    // Poll until CCS (spine.js) and the JS-rendered cards are both ready.
    var tries = 0;
    var poll = setInterval(function () {
      if (start() || ++tries > 50) clearInterval(poll);
    }, 100);
  })();
  </script>
</body>
</html>
