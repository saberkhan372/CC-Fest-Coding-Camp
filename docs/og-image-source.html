<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,800;9..144,900&family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:1200px;height:630px;overflow:hidden;background:#f6f0e7;font-family:"DM Sans",system-ui,sans-serif;position:relative}

.bg-blob-1{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(201,111,74,.16),transparent 70%);top:-200px;left:-160px}
.bg-blob-2{position:absolute;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(122,94,168,.12),transparent 70%);top:-100px;right:-100px}

.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(44,42,38,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(44,42,38,.02) 1px,transparent 1px);background-size:28px 28px}

/* ── LEFT CONTENT ── */
.left{position:absolute;left:68px;top:0;bottom:0;width:680px;display:flex;flex-direction:column;justify-content:center;gap:0}

.eyebrow{font-size:14px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#c8391d;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.eyebrow::before{content:"";width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,#c8391d,#f5a800);flex-shrink:0}

.headline{font-family:"Fraunces",serif;font-weight:900;font-size:104px;line-height:.86;letter-spacing:-.055em;color:#201c1a;margin-bottom:18px}
.headline em{color:#c8391d;font-style:normal}

.tagline{font-size:26px;color:#3d3830;font-weight:500;line-height:1.35;margin-bottom:20px;max-width:620px}

.bottom-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}

.cta{display:inline-flex;align-items:center;gap:8px;background:#c8391d;color:#fff;font-family:"DM Mono",monospace;font-size:16px;font-weight:700;padding:12px 22px;border-radius:10px;letter-spacing:.02em;box-shadow:3px 3px 0 rgba(0,0,0,.18)}

.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;padding:8px 14px;border-radius:7px;font-family:"DM Mono",monospace;font-size:13px;font-weight:600;border:1.5px solid;box-shadow:2px 2px 0 rgba(0,0,0,.1)}
.p-gold{background:#fff;color:#a06d00;border-color:#f5a800}
.p-purple{background:#fff;color:#7a5ea8;border-color:#7a5ea8}
.p-green{background:#fff;color:#2d6a4f;border-color:#2d6a4f}

.byline{margin-top:0;margin-bottom:22px;font-size:16px;font-weight:600;color:#5c5751;font-family:"DM Sans",sans-serif;letter-spacing:.01em}

/* ── RIGHT STICKERS ── */
.right{position:absolute;right:60px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:16px;align-items:flex-end}

.sticker{display:inline-flex;align-items:center;justify-content:center;padding:14px 24px;border-radius:14px;color:#fff;font-family:"DM Mono",monospace;font-size:17px;font-weight:700;letter-spacing:.02em;box-shadow:0 6px 20px rgba(53,43,32,.22),0 1px 0 rgba(255,255,255,.25) inset;white-space:nowrap}
.s1{background:#c8391d;transform:rotate(-4deg)}
.s2{background:#f5a800;color:#201c1a;transform:rotate(3deg)}
.s3{background:#5c4084;transform:rotate(-2.5deg)}
.s4{background:#2d6a4f;transform:rotate(5deg)}
.s5{background:#201c1a;font-size:14px;transform:rotate(-3deg)}

/* ── BOTTOM WAVE STRIP ── */
.wave-strip{position:absolute;bottom:0;left:0;right:0;height:72px}
</style>
</head>
<body>
  <div class="bg-blob-1"></div>
  <div class="bg-blob-2"></div>
  <div class="grid"></div>

  <div class="left">
    <div class="eyebrow">CC Fest Coding Camp</div>
    <div class="byline">by Saber Khan</div>
    <div class="headline">Tools for<br>creative<br>coding<em>.</em></div>
    <div class="tagline">Free tools for learning creative coding with p5.js.</div>
    <div class="bottom-row">
      <span class="cta">Explore free tools →</span>
      <div class="pills">
        <span class="pill p-gold">Starter Sketches</span>
        <span class="pill p-purple">Free &amp; Open</span>
        <span class="pill p-green">30+ tools</span>

    </div>

  <div class="right">
    <span class="sticker s1">draw()</span>

  </div>
