<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CC Fest — The Session Arc as a Wayfinding Spine</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">

  <style>
    html, body { margin: 0; padding: 0; }
    body { font-family: "Inter Tight", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    a { color: inherit; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="session-data.jsx"></script>
  <script type="text/babel" src="session-spine.jsx"></script>
  <script type="text/babel" src="session-page.jsx"></script>

  <script type="text/babel">
    const { useState } = React;
    const { SpineStyle, TopStepper, SideRail, ArcBand } = window.SessionSpine;
    const { SessionDetail, DeepToolPage } = window.SessionPage;

    const THEMES = {
      warm:  { paper: '#f7f5f0', paperAlt: '#efece4', ink: '#1b1a17', muted: '#6e6b64', rule: 'rgba(27,26,23,0.14)' },
      light: { paper: '#ffffff', paperAlt: '#f4f4f1', ink: '#121211', muted: '#6b6b65', rule: 'rgba(12,12,10,0.12)' },
      dark:  { paper: '#141413', paperAlt: '#1e1d1b', ink: '#f1efea', muted: '#9a958c', rule: 'rgba(241,239,234,0.16)' },
    };

    const DEFAULTS = /*EDITMODE-BEGIN*/{
      "spine": "side",
      "theme": "warm",
      "accent": "#bc7a2c"
    }/*EDITMODE-END*/;

    const SECT = (C) => ({
      fontFamily: '"JetBrains Mono",monospace', fontSize: 10.5, letterSpacing: '.16em',
      textTransform: 'uppercase', color: C.accent, marginBottom: 16,
    });

    function OverviewSection({ C, spine, current, onSelect }) {
      if (spine === 'side') {
        return (
          <div style={{ display: 'grid', gridTemplateColumns: '248px 1fr', gap: 36, alignItems: 'start' }}>
            <div style={{ position: 'sticky', top: 16 }}>
              <div style={SECT(C)}>The arc</div>
              <SideRail C={C} current={current} onSelect={onSelect} />
            </div>
            <SessionDetail C={C} current={current} onSelect={onSelect} />
          </div>
        );
      }
      return (
        <div>
          <div style={SECT(C)}>The arc — first marks to open studio</div>
          {spine === 'top'
            ? <TopStepper C={C} current={current} onSelect={onSelect} />
            : <ArcBand C={C} current={current} onSelect={onSelect} />}
          <div style={{ marginTop: 40 }}>
            <SessionDetail C={C} current={current} onSelect={onSelect} />
          </div>
        </div>
      );
    }

    function App() {
      const [t, setTweak] = useTweaks(DEFAULTS);
      const base = THEMES[t.theme] || THEMES.warm;
      const C = { ...base, accent: t.accent };
      const [current, setCurrent] = useState(1);

      return (
        <div style={{ background: C.paper, color: C.ink, minHeight: '100vh' }}>
          <SpineStyle C={C} />
          <div style={{ maxWidth: 1120, margin: '0 auto', padding: '40px 28px 120px' }}>

            <header style={{ marginBottom: 40, paddingBottom: 26, borderBottom: `1px solid ${C.rule}` }}>
              <div style={{ fontFamily: '"JetBrains Mono",monospace', fontSize: 10.5, letterSpacing: '.14em', textTransform: 'uppercase', color: C.muted, marginBottom: 14 }}>CC Fest Coding Camp · Wayfinding</div>
              <h1 style={{ margin: 0, fontFamily: '"Inter Tight",sans-serif', fontWeight: 500, fontSize: 'clamp(34px,4.4vw,56px)', lineHeight: 1.02, letterSpacing: '-0.04em', maxWidth: '18ch' }}>
                One arc. <span style={{ color: C.accent }}>A spine you can trace</span> — and jump onto anywhere.
              </h1>
              <p style={{ margin: '20px 0 0', maxWidth: '60ch', color: C.muted, fontSize: 16, lineHeight: 1.55 }}>
                Five sessions move from first marks to open studio, but every tool stands alone. The spine has to do two jobs at once: show the journey, and let someone drop in mid-arc without feeling lost. Click any station — the whole page reorients. Switch the spine's form in Tweaks.
              </p>
            </header>

            <section style={{ marginBottom: 64 }}>
              <OverviewSection C={C} spine={t.spine} current={current} onSelect={setCurrent} />
            </section>

            <section>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 8, paddingTop: 28, borderTop: `1px solid ${C.ink}` }}>
                <div style={{ fontFamily: '"JetBrains Mono",monospace', fontSize: 10.5, letterSpacing: '.16em', textTransform: 'uppercase', color: C.accent }}>Same spine, deep page</div>
              </div>
              <p style={{ margin: '0 0 22px', maxWidth: '58ch', color: C.muted, fontSize: 14.5, lineHeight: 1.5 }}>
                On an individual tool, the arc shrinks to a slim you-are-here strip, and a second, finer rail appears for the stations within the session. The same wayfinding logic, two zoom levels.
              </p>
              <DeepToolPage C={C} current={current} onSelect={setCurrent} />
            </section>
          </div>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Wayfinding" />
            <TweakRadio label="Spine form" value={t.spine}
              options={[{ value: 'top', label: 'Top' }, { value: 'side', label: 'Side' }, { value: 'arc', label: 'Arc' }]}
              onChange={(v) => setTweak('spine', v)} />

            <TweakSection label="Palette" />
            <TweakRadio label="Theme" value={t.theme} options={['warm', 'light', 'dark']}
              onChange={(v) => setTweak('theme', v)} />
            <TweakColor label="Accent" value={t.accent}
              options={['#bc7a2c', '#c64a26', '#3a8a5c', '#3f82c4', '#8a5bd0']}
              onChange={(v) => setTweak('accent', v)} />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
