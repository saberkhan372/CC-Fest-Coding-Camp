<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CC Fest — Filter / Taxonomy Study</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">

  <style>
    html, body { margin: 0; padding: 0; }
    body { font-family: "Inter Tight", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    a { color: inherit; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="filter-data.jsx"></script>
  <script type="text/babel" src="filter-shared.jsx"></script>
  <script type="text/babel" src="filter-paradigms.jsx"></script>

  <script type="text/babel">
    const { useState } = React;
    const { FsStyle } = window.FilterShared;
    const { ParadigmLens, ParadigmFaceted, ParadigmCommand, ParadigmShelves } = window.FilterParadigms;

    const THEMES = {
      warm:  { paper: '#f7f5f0', paperAlt: '#efece4', ink: '#1b1a17', muted: '#6e6b64', rule: 'rgba(27,26,23,0.14)' },
      light: { paper: '#ffffff', paperAlt: '#f4f4f1', ink: '#121211', muted: '#6b6b65', rule: 'rgba(12,12,10,0.12)' },
      dark:  { paper: '#141413', paperAlt: '#1e1d1b', ink: '#f1efea', muted: '#9a958c', rule: 'rgba(241,239,234,0.16)' },
    };

    const PARADIGMS = [
      { id: 'lens',     tab: 'A · Lens',    Comp: ParadigmLens,     label: 'A — Lens & Refine' },
      { id: 'faceted',  tab: 'B · Faceted', Comp: ParadigmFaceted,  label: 'B — Faceted Rail' },
      { id: 'command',  tab: 'C · Command', Comp: ParadigmCommand,  label: 'C — Command Bar' },
      { id: 'shelves',  tab: 'D · Shelves', Comp: ParadigmShelves,  label: 'D — Shelves' },
    ];

    const DEFAULTS = /*EDITMODE-BEGIN*/{
      "paradigm": "lens",
      "theme": "warm",
      "accent": "#bc7a2c",
      "density": "regular"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(DEFAULTS);
      const base = THEMES[t.theme] || THEMES.warm;
      const C = { ...base, accent: t.accent };
      const dense = t.density === 'compact';
      const current = PARADIGMS.find(p => p.id === t.paradigm) || PARADIGMS[0];
      const Comp = current.Comp;

      const cssVars = {
        '--fs-paper': C.paper, '--fs-paperAlt': C.paperAlt, '--fs-ink': C.ink,
        '--fs-muted': C.muted, '--fs-accent': C.accent, '--fs-rule': C.rule,
      };

      return (
        <div className="fs-root" style={{ background: C.paper, color: C.ink, minHeight: '100vh', ...cssVars }}>
          <FsStyle C={C} />

          {/* META TOP BAR — study scaffolding, deliberately distinct from the design */}
          <div style={{
            position: 'sticky', top: 0, zIndex: 20,
            background: C.ink, color: C.paper,
            display: 'flex', alignItems: 'stretch', flexWrap: 'wrap',
            borderBottom: `1px solid ${C.ink}`,
          }}>
            <div style={{
              display: 'flex', alignItems: 'center', gap: 10, padding: '0 18px',
              fontFamily: '"JetBrains Mono",monospace', fontSize: 10.5, letterSpacing: '.12em',
              textTransform: 'uppercase', opacity: 0.85, minHeight: 46,
            }}>
              <span style={{ color: C.accent }}>◆</span> Filter / Taxonomy Study
            </div>
            <div style={{ display: 'flex', marginLeft: 'auto' }}>
              {PARADIGMS.map(p => {
                const on = p.id === t.paradigm;
                return (
                  <button key={p.id} className="fs-tab" onClick={() => setTweak('paradigm', p.id)}
                    style={{
                      appearance: 'none', background: 'transparent', border: 'none',
                      borderLeft: `1px solid rgba(255,255,255,0.12)`,
                      borderBottom: `2px solid ${on ? C.accent : 'transparent'}`,
                      color: on ? C.paper : 'rgba(255,255,255,0.6)',
                      font: '500 12.5px "Inter Tight",sans-serif', cursor: 'default',
                      padding: '0 18px', minHeight: 46,
                    }}>{p.tab}</button>
                );
              })}
            </div>
          </div>

          {/* CONTENT */}
          <div style={{ maxWidth: 1200, margin: '0 auto', padding: '40px 28px 120px' }}>
            <header style={{ marginBottom: 40, paddingBottom: 28, borderBottom: `1px solid ${C.rule}` }}>
              <div style={{
                fontFamily: '"JetBrains Mono",monospace', fontSize: 10.5, letterSpacing: '.14em',
                textTransform: 'uppercase', color: C.muted, marginBottom: 14,
              }}>CC Fest Coding Camp · Catalog UX</div>
              <h1 style={{
                margin: 0, fontFamily: '"Inter Tight",sans-serif', fontWeight: 500,
                fontSize: 'clamp(34px,4.4vw,56px)', lineHeight: 1.02, letterSpacing: '-0.04em', maxWidth: '20ch',
              }}>
                Five facets, <span style={{ color: C.accent }}>one catalog.</span> Four ways in.
              </h1>
              <p style={{ margin: '20px 0 0', maxWidth: '60ch', color: C.muted, fontSize: 16, lineHeight: 1.55 }}>
                The catalog is 135 small things — bridges, tools, sketches — crossed by category, goal, level, and session.
                Here are four working answers to the same question: <em>how should someone narrow it down?</em>{' '}
                Switch paradigms in the bar above; every one actually filters the same 54-item sample.
              </p>
            </header>

            <Comp C={C} dense={dense} />
          </div>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Study" />
            <TweakSelect label="Paradigm" value={t.paradigm}
              options={PARADIGMS.map(p => ({ value: p.id, label: p.label }))}
              onChange={(v) => setTweak('paradigm', v)} />
            <TweakRadio label="Density" value={t.density} options={['compact', 'regular']}
              onChange={(v) => setTweak('density', v)} />

            <TweakSection label="Palette" />
            <TweakRadio label="Theme" value={t.theme} options={['warm', 'light', 'dark']}
              onChange={(v) => setTweak('theme', v)} />
            <TweakColor label="Accent" value={t.accent}
              options={['#bc7a2c', '#c64a26', '#3a8a5c', '#3f82c4', '#8a5bd0']}
              onChange={(v) => setTweak('accent', v)} />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
